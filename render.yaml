services:
  - type: web
    name: policy-rag
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/ingest_corpus.py
    startCommand: python -m gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.8"
